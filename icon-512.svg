<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Brain outline -->
  <ellipse cx="256" cy="230" rx="108" ry="120" fill="none" stroke="#fff" stroke-width="8" opacity="0.9" filter="url(#glow)"/>
  <!-- Brain details -->
  <path d="M 200 210 Q 220 190 240 210 T 280 210" fill="none" stroke="#fff" stroke-width="5" opacity="0.7"/>
  <path d="M 200 245 Q 220 225 240 245 T 280 245" fill="none" stroke="#fff" stroke-width="5" opacity="0.7"/>
  <path d="M 200 280 Q 220 260 240 280 T 280 280" fill="none" stroke="#fff" stroke-width="5" opacity="0.7"/>
  <!-- Lightning bolt -->
  <path d="M 270 130 L 235 245 L 268 235 L 238 355" fill="none" stroke="#fbbf24" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Brain stem -->
  <path d="M 256 350 L 256 400" fill="none" stroke="#fff" stroke-width="6" opacity="0.6"/>
</svg>
